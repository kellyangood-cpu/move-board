<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>The Move Board — private</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Public+Sans:wght@400;600;700&display=swap');
:root{--paper:#f7f2ea;--ink:#2b2620;--ink-soft:#6b6155;--brick:#b4552d;--card:#fffdf8;--line:#d9cfbe;--rose:#a4453f;--rose-bg:#f1ddd8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Public Sans',-apple-system,sans-serif;background:var(--paper);
background-image:radial-gradient(rgba(43,38,32,.035) 1px,transparent 1px);background-size:22px 22px;
color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:420px;width:100%;
padding:36px 32px;box-shadow:0 1px 2px rgba(43,38,32,.06),0 12px 32px -12px rgba(43,38,32,.22)}
.kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--brick);font-weight:700;margin-bottom:8px}
h1{font-family:'Fraunces',serif;font-weight:900;font-size:28px;line-height:1.05;margin-bottom:6px}
.sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:22px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 5px}
input{width:100%;font-family:inherit;font-size:15px;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
input:focus{outline:none;border-color:var(--ink)}
button{width:100%;margin-top:20px;font-family:inherit;font-size:15px;font-weight:700;padding:13px;border:none;border-radius:9px;
background:var(--ink);color:var(--paper);cursor:pointer;transition:transform .12s}
button:hover{transform:translateY(-1px)}
button:disabled{opacity:.55;cursor:wait;transform:none}
.err{display:none;margin-top:14px;font-size:13px;font-weight:600;color:var(--rose);background:var(--rose-bg);border-radius:8px;padding:9px 12px}
.foot{margin-top:22px;font-size:11.5px;color:var(--ink-soft);text-align:center}
</style>
</head>
<body>
<form class="gate" id="gate">
  <div class="kicker">Angood–Byrne household</div>
  <h1>The Move Board</h1>
  <p class="sub">This page is private. Enter your name and the password Kelly gave you.</p>
  <label for="who">Your name</label>
  <input id="who" name="who" autocomplete="name" required maxlength="60" placeholder="e.g. Josh">
  <label for="pw">Password</label>
  <input id="pw" name="pw" type="password" autocomplete="current-password" required>
  <button id="go" type="submit">Open the board</button>
  <div class="err" id="err">That password isn't right — check with Kelly and try again.</div>
  <div class="foot">Oakhill Court ⇢ Glenalmond Road · encrypted end-to-end</div>
</form>

const LOG_ENDPOINT = "https://docs.google.com/forms/d/e/1FAIpQLSfdV8Q8mCdaue0oKjWLjT2qBJNK6Q7YWQfLcm2jPkAGNzeEcQ/formResponse";
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function gunzip(buf){
  const ds = new DecompressionStream('gzip');
  const stream = new Response(buf).body.pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function decrypt(pass){
  const salt = b64(PAYLOAD.salt), iv = b64(PAYLOAD.iv), blob = b64(PAYLOAD.data);
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:310000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const gz = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, blob); // throws on wrong password
  const html = await gunzip(new Uint8Array(gz));
  return new TextDecoder().decode(html);
}
function logAccess(name){
  if(!LOG_ENDPOINT) return;
  try{
    const body = new URLSearchParams();
    body.set("entry.491844303", name);
    fetch(LOG_ENDPOINT,{method:'POST',mode:'no-cors',keepalive:true,
      headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  }catch(e){}
}
document.getElementById('gate').addEventListener('submit', async ev=>{
  ev.preventDefault();
  const btn=document.getElementById('go'), err=document.getElementById('err');
  const name=document.getElementById('who').value.trim() || 'Unnamed visitor';
  err.style.display='none'; btn.disabled=true; btn.textContent='Unlocking…';
  try{
    const html = await decrypt(document.getElementById('pw').value);
    logAccess(name);
    document.open(); document.write(html); document.close();
  }catch(e){ err.style.display='block'; btn.disabled=false; btn.textContent='Open the board'; }
});
